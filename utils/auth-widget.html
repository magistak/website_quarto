<style>
    .auth-buttons {
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
        justify-content: center;
    }
    
    #custom-auth-container {
        margin-left: auto !important;
        display: flex !important;
        align-items: flex-end;
    }
    
    /* Essential for right alignment */
    .navbar-nav {
        display: flex !important;
        width: 100% !important;
    }
    
    .auth-btn {
        background: var(--bs-primary);
        color: white;
        border: 1px solid var(--bs-primary);
        padding: 0.375rem 0.75rem;
        border-radius: 0.25rem;
        font-size: 0.875rem;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s ease;
    }
    
    .auth-btn:hover {
        background: var(--bs-primary-dark, #0056b3);
        color: white;
    }
    
    .auth-btn.logout {
        background: var(--bs-danger, #dc3545);
        border-color: var(--bs-danger, #dc3545);
    }
    
    .auth-btn.logout:hover {
        background: var(--bs-danger-dark, #c82333);
        border-color: var(--bs-danger-dark, #c82333);
    }
    
    .user-info {
        color: var(--bs-body-color);
        font-size: 0.875rem;
        margin-right: 0.5rem;
    }
</style>

<script>
    // Check if user is authenticated via Auth0 integration
    function isAuthenticated() {
        // With Auth0 integration, check for JWT token in cookies
        const jwt = getCookie('nf_jwt');
        return jwt && jwt !== '';
    }

    function getUser() {
        const jwt = getCookie('nf_jwt');
        if (jwt) {
            try {
                const decoded = parseJwt(jwt);
                return decoded;
            } catch (e) {
                return null;
            }
        }
        return null;
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    function parseJwt(token) {
        try {
            return JSON.parse(atob(token.split('.')[1]));
        } catch (e) {
            return null;
        }
    }

    function updateAuthUI() {
        const container = document.getElementById('custom-auth-container');
        if (!container) return;

        if (isAuthenticated()) {
            const user = getUser();
            const displayName = user?.name || user?.email || user?.nickname || 'User';
            
            container.innerHTML = `
                <div class="auth-buttons">
                    <span class="user-info">Hello, ${displayName}!</span>
                    <a href="/.netlify/auth/logout" class="auth-btn logout">Logout</a>
                </div>`;
        } else {
            container.innerHTML = `
                <div class="auth-buttons">
                    <a href="/.netlify/auth/login" class="auth-btn">Login with Auth0</a>
                </div>`;
        }
    }

    function createAuthUI() {
        setTimeout(() => {
            const navbar = document.querySelector('.navbar-nav') || 
                          document.querySelector('.navbar .navbar-nav') || 
                          document.querySelector('.navbar ul');
            
            if (!navbar) return;
            
            const authContainer = document.createElement('li');
            authContainer.className = 'nav-item';
            authContainer.id = 'custom-auth-container';
            navbar.appendChild(authContainer);
            
            updateAuthUI();
        }, 100);
    }

    document.addEventListener('DOMContentLoaded', createAuthUI);
</script>
